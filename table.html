<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        /* これがないと枠線が見えません */
        table {
            border-collapse: collapse; /* 枠線を1本にする */
            width: 100%;
        }
        th, td {
            border: 1px solid black; /* 黒色の枠線を引く */
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2; /* 見出しに色をつける */
        }
    </style>
</head>
<body>

    <h2>サンプルテーブル</h2>
    <table>
        <thead>
            <tr>
                <th>項目</th>
                <th>内容</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>名前</td>
                <td>サンプル太郎</td>
            </tr>
            <tr>
                <td>職業</td>
                <td>Web開発者</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
